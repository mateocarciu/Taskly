services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    command: >
      sh -lc "
      chown -R 1000:33 /var/www/storage /var/www/bootstrap/cache /var/www/database &&
      find /var/www/storage /var/www/bootstrap/cache /var/www/database -type d -exec chmod 2775 {} + &&
      find /var/www/storage /var/www/bootstrap/cache /var/www/database -type f -exec chmod 664 {} + &&
      php-fpm
      "
    networks:
      - nginx-network

  queue-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel-queue-worker
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    command: >
      sh -lc "
      chown -R 1000:33 /var/www/storage /var/www/bootstrap/cache /var/www/database &&
      find /var/www/storage /var/www/bootstrap/cache /var/www/database -type d -exec chmod 2775 {} + &&
      find /var/www/storage /var/www/bootstrap/cache /var/www/database -type f -exec chmod 664 {} + &&
      php artisan queue:work --sleep=3 --tries=3 --max-time=3600
      "
    networks:
      - nginx-network
    depends_on:
      - app

  webserver:
    image: nginx:alpine
    container_name: laravel-webserver
    restart: unless-stopped
    ports:
      - "8080:80" # On pourra le cacher derrière le proxy plus tard
    volumes:
      - ./:/var/www
      - ./docker-compose/nginx:/etc/nginx/conf.d/
    networks:
      - nginx-network
      - proxy_default

networks:
  nginx-network:
    external: true
  proxy_default:
    external: true
